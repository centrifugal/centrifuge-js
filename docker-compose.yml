version: '3.8'

services:
  centrifugo:
    image: centrifugo/centrifugo:v6
    command:
      - centrifugo
    ports:
      - "8000:8000"
    environment:
      - CENTRIFUGO_CLIENT_INSECURE=true
      - CENTRIFUGO_CLIENT_CONCURRENCY=8
      - CENTRIFUGO_CLIENT_MAP_PAGINATION_MIN_LIMIT=1
      - CENTRIFUGO_CLIENT_TOKEN_HMAC_SECRET_KEY=secret
      - CENTRIFUGO_LOG_LEVEL=trace
      - CENTRIFUGO_HTTP_STREAM_ENABLED=true
      - CENTRIFUGO_SSE_ENABLED=true
      - CENTRIFUGO_MAP_BROKER_ENABLED=true
      - CENTRIFUGO_HTTP_API_KEY=test-api-key
      # Default channel (without namespace).
      - CENTRIFUGO_CHANNEL_WITHOUT_NAMESPACE_PRESENCE=true
      - CENTRIFUGO_CHANNEL_WITHOUT_NAMESPACE_ALLOWED_DELTA_TYPES=fossil
      - CENTRIFUGO_CHANNEL_WITHOUT_NAMESPACE_DELTA_PUBLISH=true
      - CENTRIFUGO_CHANNEL_WITHOUT_NAMESPACE_HISTORY_SIZE=100
      - CENTRIFUGO_CHANNEL_WITHOUT_NAMESPACE_HISTORY_TTL=300s
      - CENTRIFUGO_CHANNEL_WITHOUT_NAMESPACE_FORCE_RECOVERY=true
      # Define namespace names (space-separated).
      - CENTRIFUGO_CHANNEL_NAMESPACES=streamless positioned smallstream delta mapdelta recovery smallhistory shortttl clientkey prestest prescli
      # streamless: ephemeral map, no recovery.
      - CENTRIFUGO_CHANNEL_NAMESPACES_STREAMLESS_SUBSCRIPTION_TYPES=map
      - CENTRIFUGO_CHANNEL_NAMESPACES_STREAMLESS_MAP_SYNC_MODE=ephemeral
      - CENTRIFUGO_CHANNEL_NAMESPACES_STREAMLESS_MAP_RETENTION_MODE=expiring
      - CENTRIFUGO_CHANNEL_NAMESPACES_STREAMLESS_MAP_KEY_TTL=60s
      - CENTRIFUGO_CHANNEL_NAMESPACES_STREAMLESS_ALLOW_SUBSCRIBE_FOR_CLIENT=true
      - CENTRIFUGO_CHANNEL_NAMESPACES_STREAMLESS_ALLOW_MAP_PUBLISH_FOR_CLIENT=true
      - CENTRIFUGO_CHANNEL_NAMESPACES_STREAMLESS_ALLOW_MAP_REMOVE_FOR_CLIENT=true
      # positioned: converging map with stream, supports recovery.
      - CENTRIFUGO_CHANNEL_NAMESPACES_POSITIONED_SUBSCRIPTION_TYPES=map
      - CENTRIFUGO_CHANNEL_NAMESPACES_POSITIONED_MAP_SYNC_MODE=converging
      - CENTRIFUGO_CHANNEL_NAMESPACES_POSITIONED_MAP_RETENTION_MODE=permanent
      - CENTRIFUGO_CHANNEL_NAMESPACES_POSITIONED_ALLOW_SUBSCRIBE_FOR_CLIENT=true
      - CENTRIFUGO_CHANNEL_NAMESPACES_POSITIONED_ALLOW_MAP_PUBLISH_FOR_CLIENT=true
      - CENTRIFUGO_CHANNEL_NAMESPACES_POSITIONED_ALLOW_MAP_REMOVE_FOR_CLIENT=true
      # smallstream: converging map with tiny stream for unrecoverable position testing.
      - CENTRIFUGO_CHANNEL_NAMESPACES_SMALLSTREAM_SUBSCRIPTION_TYPES=map
      - CENTRIFUGO_CHANNEL_NAMESPACES_SMALLSTREAM_MAP_SYNC_MODE=converging
      - CENTRIFUGO_CHANNEL_NAMESPACES_SMALLSTREAM_MAP_RETENTION_MODE=permanent
      - CENTRIFUGO_CHANNEL_NAMESPACES_SMALLSTREAM_MAP_STREAM_SIZE=2
      - CENTRIFUGO_CHANNEL_NAMESPACES_SMALLSTREAM_MAP_STREAM_TTL=60s
      - CENTRIFUGO_CHANNEL_NAMESPACES_SMALLSTREAM_ALLOW_SUBSCRIBE_FOR_CLIENT=true
      - CENTRIFUGO_CHANNEL_NAMESPACES_SMALLSTREAM_ALLOW_MAP_PUBLISH_FOR_CLIENT=true
      - CENTRIFUGO_CHANNEL_NAMESPACES_SMALLSTREAM_ALLOW_MAP_REMOVE_FOR_CLIENT=true
      # delta: stream subscription with fossil delta compression + recovery.
      - CENTRIFUGO_CHANNEL_NAMESPACES_DELTA_ALLOWED_DELTA_TYPES=fossil
      - CENTRIFUGO_CHANNEL_NAMESPACES_DELTA_DELTA_PUBLISH=true
      - CENTRIFUGO_CHANNEL_NAMESPACES_DELTA_FORCE_RECOVERY=true
      - CENTRIFUGO_CHANNEL_NAMESPACES_DELTA_HISTORY_SIZE=100
      - CENTRIFUGO_CHANNEL_NAMESPACES_DELTA_HISTORY_TTL=300s
      - CENTRIFUGO_CHANNEL_NAMESPACES_DELTA_ALLOW_SUBSCRIBE_FOR_CLIENT=true
      - CENTRIFUGO_CHANNEL_NAMESPACES_DELTA_ALLOW_PUBLISH_FOR_SUBSCRIBER=true
      # mapdelta: converging map with fossil delta compression.
      - CENTRIFUGO_CHANNEL_NAMESPACES_MAPDELTA_SUBSCRIPTION_TYPES=map
      - CENTRIFUGO_CHANNEL_NAMESPACES_MAPDELTA_MAP_SYNC_MODE=converging
      - CENTRIFUGO_CHANNEL_NAMESPACES_MAPDELTA_MAP_RETENTION_MODE=permanent
      - CENTRIFUGO_CHANNEL_NAMESPACES_MAPDELTA_ALLOWED_DELTA_TYPES=fossil
      - CENTRIFUGO_CHANNEL_NAMESPACES_MAPDELTA_DELTA_PUBLISH=true
      - CENTRIFUGO_CHANNEL_NAMESPACES_MAPDELTA_ALLOW_SUBSCRIBE_FOR_CLIENT=true
      - CENTRIFUGO_CHANNEL_NAMESPACES_MAPDELTA_ALLOW_MAP_PUBLISH_FOR_CLIENT=true
      - CENTRIFUGO_CHANNEL_NAMESPACES_MAPDELTA_ALLOW_MAP_REMOVE_FOR_CLIENT=true
      # recovery: stream subscription with recovery.
      - CENTRIFUGO_CHANNEL_NAMESPACES_RECOVERY_FORCE_RECOVERY=true
      - CENTRIFUGO_CHANNEL_NAMESPACES_RECOVERY_HISTORY_SIZE=100
      - CENTRIFUGO_CHANNEL_NAMESPACES_RECOVERY_HISTORY_TTL=300s
      - CENTRIFUGO_CHANNEL_NAMESPACES_RECOVERY_ALLOW_SUBSCRIBE_FOR_CLIENT=true
      - CENTRIFUGO_CHANNEL_NAMESPACES_RECOVERY_ALLOW_PUBLISH_FOR_SUBSCRIBER=true
      # smallhistory: stream with tiny history for unrecoverable position testing.
      - CENTRIFUGO_CHANNEL_NAMESPACES_SMALLHISTORY_FORCE_RECOVERY=true
      - CENTRIFUGO_CHANNEL_NAMESPACES_SMALLHISTORY_HISTORY_SIZE=2
      - CENTRIFUGO_CHANNEL_NAMESPACES_SMALLHISTORY_HISTORY_TTL=300s
      - CENTRIFUGO_CHANNEL_NAMESPACES_SMALLHISTORY_ALLOW_SUBSCRIBE_FOR_CLIENT=true
      - CENTRIFUGO_CHANNEL_NAMESPACES_SMALLHISTORY_ALLOW_PUBLISH_FOR_SUBSCRIBER=true
      # shortttl: ephemeral map with short key TTL for expiration testing.
      - CENTRIFUGO_CHANNEL_NAMESPACES_SHORTTTL_SUBSCRIPTION_TYPES=map
      - CENTRIFUGO_CHANNEL_NAMESPACES_SHORTTTL_MAP_SYNC_MODE=ephemeral
      - CENTRIFUGO_CHANNEL_NAMESPACES_SHORTTTL_MAP_RETENTION_MODE=expiring
      - CENTRIFUGO_CHANNEL_NAMESPACES_SHORTTTL_MAP_KEY_TTL=3s
      - CENTRIFUGO_CHANNEL_NAMESPACES_SHORTTTL_ALLOW_SUBSCRIBE_FOR_CLIENT=true
      - CENTRIFUGO_CHANNEL_NAMESPACES_SHORTTTL_ALLOW_MAP_PUBLISH_FOR_CLIENT=true
      - CENTRIFUGO_CHANNEL_NAMESPACES_SHORTTTL_ALLOW_MAP_REMOVE_FOR_CLIENT=true
      # clientkey: server overrides key to client_id.
      - CENTRIFUGO_CHANNEL_NAMESPACES_CLIENTKEY_SUBSCRIPTION_TYPES=map
      - CENTRIFUGO_CHANNEL_NAMESPACES_CLIENTKEY_MAP_SYNC_MODE=ephemeral
      - CENTRIFUGO_CHANNEL_NAMESPACES_CLIENTKEY_MAP_RETENTION_MODE=expiring
      - CENTRIFUGO_CHANNEL_NAMESPACES_CLIENTKEY_MAP_KEY_TTL=60s
      - CENTRIFUGO_CHANNEL_NAMESPACES_CLIENTKEY_MAP_CLIENT_KEY=client_id
      - CENTRIFUGO_CHANNEL_NAMESPACES_CLIENTKEY_ALLOW_SUBSCRIBE_FOR_CLIENT=true
      - CENTRIFUGO_CHANNEL_NAMESPACES_CLIENTKEY_ALLOW_MAP_PUBLISH_FOR_SUBSCRIBER=true
      # prestest: map channel with client presence enabled.
      - CENTRIFUGO_CHANNEL_NAMESPACES_PRESTEST_SUBSCRIPTION_TYPES=map
      - CENTRIFUGO_CHANNEL_NAMESPACES_PRESTEST_MAP_SYNC_MODE=ephemeral
      - CENTRIFUGO_CHANNEL_NAMESPACES_PRESTEST_MAP_RETENTION_MODE=expiring
      - CENTRIFUGO_CHANNEL_NAMESPACES_PRESTEST_MAP_KEY_TTL=60s
      - CENTRIFUGO_CHANNEL_NAMESPACES_PRESTEST_MAP_CLIENT_PRESENCE_NAMESPACE=prescli
      - CENTRIFUGO_CHANNEL_NAMESPACES_PRESTEST_ALLOW_SUBSCRIBE_FOR_CLIENT=true
      - CENTRIFUGO_CHANNEL_NAMESPACES_PRESTEST_ALLOW_MAP_PUBLISH_FOR_CLIENT=true
      # prescli: client presence channel (map_clients subscription type).
      - CENTRIFUGO_CHANNEL_NAMESPACES_PRESCLI_SUBSCRIPTION_TYPES=map_clients
      - CENTRIFUGO_CHANNEL_NAMESPACES_PRESCLI_MAP_SYNC_MODE=ephemeral
      - CENTRIFUGO_CHANNEL_NAMESPACES_PRESCLI_MAP_RETENTION_MODE=expiring
      - CENTRIFUGO_CHANNEL_NAMESPACES_PRESCLI_MAP_KEY_TTL=60s
      - CENTRIFUGO_CHANNEL_NAMESPACES_PRESCLI_ALLOW_SUBSCRIBE_FOR_CLIENT=true
